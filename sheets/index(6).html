<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference Sheets — Card Counting &amp; Quantitative Finance</title>
<style>
  :root {
    --felt: #0F3D2E;
    --felt-dark: #0A2A20;
    --cream: #F2EFE6;
    --gold: #C9A227;
    --gold-bright: #F0C94A;
    --line: rgba(242, 239, 230, 0.14);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--felt);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,0.025), transparent 45%);
    color: var(--cream);
    font-family: 'Times New Roman', Times, serif;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
  .back {
    display: inline-block;
    font-size: 0.9rem;
    color: rgba(242, 239, 230, 0.6);
    text-decoration: none;
    margin-bottom: 2.2rem;
  }
  .back:hover { color: var(--gold-bright); }
  h1 {
    font-size: clamp(1.9rem, 4vw, 2.6rem);
    font-weight: 700;
    margin: 0 0 0.6rem;
  }
  .lede {
    font-style: italic;
    color: rgba(242, 239, 230, 0.7);
    margin: 0 0 2.6rem;
  }
  .sheet-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }
  @media (max-width: 620px) {
    .sheet-grid { grid-template-columns: 1fr; }
  }
  .sheet-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0.8rem;
    padding: 1.9rem 1.2rem 1.5rem;
    border: 1px solid var(--line);
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    background: linear-gradient(160deg, rgba(255,255,255,0.03), transparent 60%);
    transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
  }
  .sheet-card:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    background: linear-gradient(160deg, rgba(201,162,39,0.09), transparent 65%);
  }
  .sheet-icon {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
  .sheet-icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--felt-dark);
  }
  .sheet-card .name {
    font-size: 1.02rem;
  }
  .sheet-card .kind {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold-bright);
  }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">&larr; Back</a>
    <h1>Reference Sheets</h1>
    <p class="lede">Printable basic strategy, table rules, and a session log for practice.</p>
    <div class="sheet-grid">

      <a class="sheet-card" href="Card_Counting_Basic_Strategy_Sheet_1.pdf">
        <span class="sheet-icon">
          <!-- strategy grid -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="1.5"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
        </span>
        <span class="name">Basic Strategy Sheet</span>
        <span class="kind">PDF</span>
      </a>

      <a class="sheet-card" href="Card_Counting_Rules_Sheet_1.pdf">
        <span class="sheet-icon">
          <!-- rulebook / scroll -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3.5h9.5L20 8v11.5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1z"/>
            <path d="M15.5 3.5V8H20"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
            <line x1="8" y1="15.5" x2="16" y2="15.5"/>
          </svg>
        </span>
        <span class="name">Rules Sheet</span>
        <span class="kind">PDF</span>
      </a>

      <a class="sheet-card" href="Card_Counting_Log_Sheet_1.pdf">
        <span class="sheet-icon">
          <!-- log / checklist -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="3.5" width="16" height="17" rx="1.5"/>
            <path d="M9 2.5h6v2.5H9z"/>
            <path d="M7.5 10.5l1.4 1.4L11.5 9"/>
            <line x1="13.5" y1="10.2" x2="16.5" y2="10.2"/>
            <path d="M7.5 15.5l1.4 1.4L11.5 14"/>
            <line x1="13.5" y1="15.2" x2="16.5" y2="15.2"/>
          </svg>
        </span>
        <span class="name">Log Sheet</span>
        <span class="kind">PDF</span>
      </a>

    </div>
  </div>
</body>
</html>
